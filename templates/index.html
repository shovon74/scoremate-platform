<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScoreMate | Professional IELTS Writing Support</title>
    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <!-- Theme Toggle Button -->
    <button id="themeToggle" class="theme-toggle" aria-label="Toggle dark mode">
        <svg id="sunIcon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
        <svg id="moonIcon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
            style="display: none;">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
    </button>

    <div class="container">
        <header>
            <h1>ScoreMate</h1>
            <p>Elevate your IELTS Writing Task 2 with AI-powered insights</p>
        </header>

        <main>
            <!-- Timer Card -->
            <div class="glass-panel timer-card">
                <div class="timer-display" id="timerDisplay">00:00</div>
                <div class="controls">
                    <button id="startBtn" class="btn btn-primary">
                        <i data-lucide="play"></i> Start Session
                    </button>
                    <button id="stopBtn" class="btn btn-secondary" disabled>
                        <i data-lucide="pause"></i> Pause
                    </button>
                    <button id="resetBtn" class="btn btn-danger">
                        <i data-lucide="rotate-ccw"></i> Reset
                    </button>
                </div>
            </div>

            <!-- Input Form -->
            <form id="checkForm" class="glass-panel">
                <div class="grid-inputs">
                    <div class="input-wrap">
                        <label for="question">Question</label>
                        <textarea id="question" name="question"
                            placeholder="Paste the IELTS Writing Task 2 prompt here..."></textarea>
                    </div>
                    <div class="input-wrap">
                        <label for="answer">Essay</label>
                        <textarea id="answer" name="answer" placeholder="Type or paste your essay here..."></textarea>
                        <div class="meta">
                            <span id="wordCount" class="badge">0 WORDS</span>
                        </div>
                    </div>
                </div>

                <div class="submit-box">
                    <button type="submit" id="submitBtn" class="btn btn-primary btn-large">
                        <i data-lucide="sparkles"></i> Analyze Essay
                    </button>
                </div>
            </form>

            <!-- Loading State -->
            <div id="loading" class="loading" style="display: none;">
                <div class="shimmer"></div>
                <p>Synthesizing feedback...</p>
            </div>

            <!-- Result Area -->
            <div id="resultArea" class="result-area">
                <div class="glass-panel">
                    <h2 style="margin-bottom: 24px; font-size: 1.8rem; display: flex; align-items: center; gap: 12px;">
                        <i data-lucide="clipboard-check" style="color: var(--accent);"></i> Results
                    </h2>
                    <div class="feedback-card">
                        <div id="feedbackContent" class="feedback-content"></div>
                    </div>

                    <!-- Spelling & Grammar Section -->
                    <div id="spellingSection" class="spelling-section" style="display: none;">
                        <div class="spelling-header" id="spellingToggle">
                            <div class="spelling-header-left">
                                <h3>Spelling & Grammar Issues</h3>
                                <span id="errorBadge" class="error-badge">0</span>
                            </div>
                            <svg class="chevron-icon" id="chevronIcon" width="20" height="20" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="6 9 12 15 18 9"></polyline>
                            </svg>
                        </div>
                        <div class="spelling-content" id="spellingContent">
                            <table class="spelling-table" id="spellingTable">
                                <thead>
                                    <tr>
                                        <th>Error</th>
                                        <th>Correction</th>
                                        <th>Type</th>
                                        <th>Part of Speech</th>
                                    </tr>
                                </thead>
                                <tbody id="spellingTableBody">
                                    <!-- Rows will be inserted here -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script>
        // Initialize Lucide icons
        lucide.createIcons();
    </script>
</body>

</html>
